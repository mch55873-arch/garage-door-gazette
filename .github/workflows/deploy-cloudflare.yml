name: Deploy Garage Door Gazette

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

concurrency:
  group: garage-door-gazette-production-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build static site
        run: npm run build

      - name: Prepare nationwide city database
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p data
          curl --fail --silent --show-error --location \
            "https://raw.githubusercontent.com/mch55873-arch/batys-pest-control/f1ee071d494b65c821e7b971a3f1e011f29753f9/data/usa_locations.json" \
            --output data/usa_locations.json
          node - <<'NODE'
          const fs = require('fs');
          const db = JSON.parse(fs.readFileSync('data/usa_locations.json', 'utf8'));
          const cities = db.states.reduce((sum, state) => sum + state.cities.length, 0);
          const services = 72;
          const core = 160;
          console.log(`Location database: ${db.states.length} states/DC, ${cities} cities/communities`);
          console.log(`Indexable URL architecture: ${core + cities * (services + 1)} total URLs`);
          NODE

      - name: Ensure proxied wildcard DNS record
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node - <<'NODE' 2>&1 | tee wildcard-dns.log
          const token = process.env.CLOUDFLARE_API_TOKEN;
          const domain = 'garagedoorgazette.com';
          const api = 'https://api.cloudflare.com/client/v4';
          const headers = { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' };
          async function request(path, options = {}) {
            const response = await fetch(`${api}${path}`, { ...options, headers: { ...headers, ...(options.headers || {}) } });
            const payload = await response.json().catch(() => ({}));
            if (!response.ok || payload.success === false) {
              const detail = payload.errors?.map((item) => `${item.code || ''} ${item.message}`).join('; ') || `${response.status} ${response.statusText}`;
              throw new Error(`${options.method || 'GET'} ${path}: ${detail}`);
            }
            return payload.result;
          }
          const zones = await request(`/zones?name=${encodeURIComponent(domain)}&status=active`);
          const zone = zones[0];
          if (!zone?.id) throw new Error(`Active zone not found for ${domain}`);
          const wildcardName = `*.${domain}`;
          const records = await request(`/zones/${zone.id}/dns_records?name=${encodeURIComponent(wildcardName)}&per_page=100`);
          const record = records[0];
          const desired = { type: 'CNAME', name: wildcardName, content: domain, proxied: true, ttl: 1 };
          if (!record) {
            const created = await request(`/zones/${zone.id}/dns_records`, { method: 'POST', body: JSON.stringify(desired) });
            console.log(`Created wildcard DNS record ${created.name} -> ${created.content}; proxied=${created.proxied}`);
          } else if (record.type !== 'CNAME' || record.content !== domain || record.proxied !== true) {
            const updated = await request(`/zones/${zone.id}/dns_records/${record.id}`, { method: 'PUT', body: JSON.stringify(desired) });
            console.log(`Updated wildcard DNS record ${updated.name} -> ${updated.content}; proxied=${updated.proxied}`);
          } else {
            console.log(`Wildcard DNS record already correct: ${record.name} -> ${record.content}; proxied=${record.proxied}`);
          }
          NODE

      - name: Deploy to Cloudflare Workers
        shell: bash
        run: |
          set -o pipefail
          npx wrangler@latest deploy 2>&1 | tee wrangler-deploy.log

      - name: Verify production URLs
        shell: bash
        run: |
          set -u
          exec > >(tee production-verification.log) 2>&1
          failures=0
          echo "=== DNS resolution ==="
          getent ahosts south-dakota.garagedoorgazette.com || true
          getent ahosts sioux-falls-south-dakota.garagedoorgazette.com || true
          echo
          check_url() {
            local label="$1"
            local url="$2"
            local result
            local status
            result=$(curl --silent --show-error --location --max-redirs 8 --connect-timeout 15 --max-time 60 --output /dev/null --write-out '%{http_code}|%{url_effective}|%{remote_ip}' "$url" 2>&1)
            status=$?
            echo "$label: $url -> $result"
            if [ "$status" -ne 0 ]; then
              failures=$((failures + 1))
              return
            fi
            case "$result" in
              200\|*) ;;
              *) failures=$((failures + 1)) ;;
            esac
          }
          check_url "Workers.dev homepage" "https://garage-door-gazette.mch55873.workers.dev/"
          check_url "Apex homepage" "https://garagedoorgazette.com/"
          check_url "State subdomain" "https://south-dakota.garagedoorgazette.com/"
          check_url "City subdomain" "https://sioux-falls-south-dakota.garagedoorgazette.com/"
          check_url "City service" "https://sioux-falls-south-dakota.garagedoorgazette.com/broken-garage-door-spring-repair/"
          check_url "Legacy state redirect" "https://garagedoorgazette.com/locations/south-dakota/"
          check_url "Sitemap index" "https://garagedoorgazette.com/sitemap.xml"
          check_url "Core sitemap" "https://garagedoorgazette.com/sitemaps/core.xml"
          check_url "State sitemap shard" "https://garagedoorgazette.com/sitemaps/south-dakota-1.xml"
          check_url "WWW homepage" "https://www.garagedoorgazette.com/"
          echo "Verification failures: $failures"
          test "$failures" -eq 0

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-deployment-log
          path: |
            wildcard-dns.log
            wrangler-deploy.log
            production-verification.log
          if-no-files-found: ignore
          retention-days: 3

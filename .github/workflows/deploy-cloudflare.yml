name: Deploy Garage Door Gazette

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: garage-door-gazette-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build static site
        run: npm run build

      - name: Deploy to Cloudflare Workers
        shell: bash
        run: |
          set -o pipefail
          npx wrangler@latest deploy 2>&1 | tee wrangler-deploy.log

      - name: Verify production URLs
        shell: bash
        run: |
          set -euo pipefail
          check_url() {
            local label="$1"
            local url="$2"
            local result
            result=$(curl --silent --show-error --location --max-redirs 8 --connect-timeout 15 --max-time 45 --output /dev/null --write-out '%{http_code}|%{url_effective}|%{remote_ip}' "$url")
            echo "$label: $url -> $result"
            case "$result" in
              200\|*) ;;
              *) exit 1 ;;
            esac
          }
          check_url "Workers.dev homepage" "https://garage-door-gazette.mch55873.workers.dev/"
          check_url "Apex homepage" "https://garagedoorgazette.com/"
          check_url "Services" "https://garagedoorgazette.com/services/"
          check_url "Locations" "https://garagedoorgazette.com/locations/"
          check_url "Articles" "https://garagedoorgazette.com/articles/"
          check_url "Sitemap" "https://garagedoorgazette.com/sitemap.xml"
          check_url "WWW homepage" "https://www.garagedoorgazette.com/"

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-deployment-log
          path: wrangler-deploy.log
          if-no-files-found: ignore
          retention-days: 3
